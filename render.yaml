services:
  - type: web
    name: cardapio-digital-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.5.0
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://cardapio-digital.vercel.app
